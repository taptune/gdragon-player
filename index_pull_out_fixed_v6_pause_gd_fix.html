<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>G-DRAGON Surprise Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
:root{--vinyl-size:280px;--sleeve-size:300px;--sleeve-left:-150px;}
body{background:radial-gradient(circle at top,rgba(255,255,255,.08),transparent 32%),#000;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;overflow-x:hidden;}
.container{width:100%;max-width:520px;text-align:center;}
.artist{font-size:16px;letter-spacing:6px;color:#999;margin-bottom:20px;}
.song{font-size:34px;font-weight:800;margin-bottom:20px;min-height:80px;display:flex;align-items:center;justify-content:center;padding:0 20px;line-height:1.05;}
.record-scene{width:100%;max-width:390px;height:340px;margin:0 auto 18px;position:relative;overflow:visible;perspective:1200px;}
.sleeve-layer{position:absolute;width:var(--sleeve-size);height:var(--sleeve-size);left:50%;top:20px;transform:translateX(calc(-50% + var(--sx,0px)));background-size:cover;background-position:center;background-repeat:no-repeat;pointer-events:none;opacity:1;visibility:visible;display:block;transition:opacity .55s ease, transform .75s cubic-bezier(.2,.85,.2,1), visibility .55s step-end;}
.sleeve-back{background-image:url("images/sleeve-back.jpg");z-index:2;filter:brightness(.78) drop-shadow(0 22px 38px rgba(0,0,0,.55));}
.sleeve-top{background-image:url("images/sleeve-top.png");z-index:6;filter:drop-shadow(0 15px 30px rgba(0,0,0,.45));}
.sleeve-left{--sx:var(--sleeve-left);}
.sleeve-gone{opacity:0!important;visibility:hidden!important;pointer-events:none!important;}
.vinyl-wrapper{position:absolute;left:50%;top:30px;width:var(--vinyl-size);height:var(--vinyl-size);transform:translateX(var(--rx,-50%)) scale(var(--rs,1)) rotateY(var(--flip,0deg));transition:transform .88s cubic-bezier(.18,.95,.22,1), opacity .25s ease, filter .55s ease;transform-style:preserve-3d;z-index:4;cursor:pointer;opacity:1;}
.vinyl-wrapper.inside{--record-x:0px;--rx:calc(-50% + var(--record-x));--rs:.82;filter:brightness(.88);}.vinyl-wrapper.inside.in-left-sleeve{--record-x:var(--sleeve-left);}
.vinyl-wrapper.center{--rx:-50%;--rs:1;filter:brightness(1);}
.vinyl-wrapper.hidden{opacity:0;}
.vinyl{width:100%;height:100%;border-radius:50%;position:relative;overflow:hidden;background:#050505;animation:spin 4s linear infinite;animation-play-state:paused;box-shadow:0 30px 65px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.08),inset 0 0 45px rgba(255,255,255,.045),inset 0 0 70px rgba(0,0,0,.75);transform-style:preserve-3d;transition:transform .62s cubic-bezier(.22,.9,.18,1), filter .25s ease;}
.vinyl.playing{animation-play-state:running;}
.vinyl-wrapper.flip-half{--flip:88deg;filter:brightness(1.25) drop-shadow(0 18px 30px rgba(0,0,0,.55));}
.album-art{position:absolute;inset:0;border-radius:50%;background-size:cover;background-position:center;z-index:1;}
.grooves{position:absolute;inset:0;border-radius:50%;background:repeating-radial-gradient(circle,transparent 0,transparent 3px,rgba(0,0,0,.22) 4px,rgba(0,0,0,.22) 5px),radial-gradient(circle at 31% 23%,rgba(255,255,255,.24),transparent 17%),linear-gradient(130deg,transparent 8%,rgba(255,255,255,.18) 20%,transparent 34%,transparent 64%,rgba(255,255,255,.07) 75%,transparent 88%);mix-blend-mode:screen;z-index:2;pointer-events:none;}
.vinyl::after{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,transparent 0 36%,rgba(0,0,0,.12) 45%,rgba(0,0,0,.4) 75%,rgba(0,0,0,.72) 100%),linear-gradient(135deg,rgba(255,255,255,.16),transparent 25%,transparent 70%,rgba(255,255,255,.08));z-index:3;pointer-events:none;}
.center-label{position:absolute;width:96px;height:96px;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;z-index:4;pointer-events:none;box-shadow:0 0 0 6px rgba(0,0,0,.72), inset 0 0 0 1px rgba(255,255,255,.10), 0 8px 20px rgba(0,0,0,.45);background:radial-gradient(circle, rgba(255,255,255,.08) 0 16px, rgba(0,0,0,.12) 17px 30px, rgba(255,255,255,.08) 31px 48px, rgba(0,0,0,.18) 49px 100%);}
.center-label::after{content:"";position:absolute;inset:0;border-radius:50%;background:linear-gradient(135deg, rgba(255,255,255,.18), transparent 30%, transparent 70%, rgba(255,255,255,.06));opacity:.9;}
.spindle{position:absolute;width:10px;height:10px;border-radius:50%;background:#050505;top:50%;left:50%;transform:translate(-50%,-50%);z-index:6;border:1px solid rgba(255,255,255,.35);box-shadow:0 0 10px rgba(0,0,0,.85);}
.tonearm{position:absolute;width:146px;height:104px;right:-4px;top:2px;z-index:12;transform-origin:118px 20px;transform:rotate(-14deg);transition:transform .55s cubic-bezier(.2,.85,.2,1),opacity .35s ease,filter .35s ease;pointer-events:none;filter:drop-shadow(0 10px 18px rgba(0,0,0,.55));}
.tonearm.raised{transform:rotate(18deg);}
.tonearm.idle-hidden{opacity:0;}
.tonearm-base{position:absolute;width:46px;height:46px;right:0;top:0;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.95) 0 8%,rgba(210,210,210,.9) 9%,rgba(130,130,130,.95) 32%,rgba(28,28,28,1) 72%,rgba(6,6,6,1) 100%);box-shadow:0 10px 22px rgba(0,0,0,.65),inset 0 2px 5px rgba(255,255,255,.3),inset 0 -6px 10px rgba(0,0,0,.5);}
.tonearm-pivot{position:absolute;width:14px;height:14px;right:16px;top:16px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#f8f8f8,#aaaaaa 45%,#4a4a4a 70%,#161616 100%);}
.tonearm-bar{position:absolute;width:112px;height:9px;right:27px;top:18px;border-radius:999px;transform:rotate(-28deg);transform-origin:right center;background:linear-gradient(180deg,rgba(255,255,255,.85),rgba(215,215,215,.9) 20%,rgba(118,118,118,.95) 55%,rgba(235,235,235,.85) 100%);box-shadow:0 6px 12px rgba(0,0,0,.35),inset 0 1px 2px rgba(255,255,255,.55),inset 0 -1px 2px rgba(0,0,0,.18);}
.counterweight{position:absolute;width:22px;height:14px;right:103px;top:31px;border-radius:10px;transform:rotate(-28deg);background:linear-gradient(180deg,#d8d8d8,#7b7b7b 48%,#2e2e2e 100%);}
.headshell{position:absolute;width:24px;height:16px;left:10px;top:48px;transform:rotate(-28deg);border-radius:4px 4px 6px 6px;background:linear-gradient(180deg,#efefef,#9c9c9c 42%,#3b3b3b 100%);}
.stylus{position:absolute;width:12px;height:26px;left:4px;top:55px;transform:rotate(-28deg);}
.stylus::before{content:"";position:absolute;left:2px;top:0;width:8px;height:12px;border-radius:2px;background:linear-gradient(180deg,#e9e9e9,#8b8b8b 45%,#2d2d2d 100%);}
.stylus::after{content:"";position:absolute;left:5px;top:10px;width:2px;height:14px;background:linear-gradient(180deg,#f0f0f0,#575757 75%,#111 100%);transform:skewX(-10deg);}
.subtitle{color:#777;font-size:12px;letter-spacing:3.5px;margin-bottom:18px;}
.progress-area{width:100%;max-width:340px;margin:0 auto 22px;}
.progress-bar{width:100%;height:5px;border-radius:999px;background:rgba(255,255,255,.15);overflow:hidden;cursor:pointer;}
.progress-fill{width:0%;height:100%;border-radius:inherit;background:#fff;transition:width .12s linear;}
.time-row{display:flex;justify-content:space-between;margin-top:8px;color:#777;font-size:12px;letter-spacing:1px;}
.random-btn{border:none;padding:18px 36px;border-radius:999px;cursor:pointer;font-size:16px;font-weight:800;background:#fff;color:#000;box-shadow:0 15px 35px rgba(255,255,255,.12);transition:transform .18s ease,opacity .18s ease;}
.random-btn:active{transform:scale(.97);}
.random-btn:disabled{opacity:.55;cursor:not-allowed;}
audio{display:none;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@media(max-width:430px){:root{--vinyl-size:260px;--sleeve-size:280px;--sleeve-left:-138px;}.record-scene{height:320px}.sleeve-layer{top:24px}.vinyl-wrapper{top:34px}.center-label{width:88px;height:88px}.tonearm{right:-8px;top:4px;transform:rotate(-14deg) scale(.9)}.tonearm.raised{transform:rotate(18deg) scale(.9)}}

/* Initial load guard: sleeve paints first, record is already between layers */
.record-scene.initial-loading .sleeve-back,
.record-scene.initial-loading .sleeve-top{
  opacity:1!important;
  visibility:visible!important;
  display:block!important;
}
.record-scene.initial-loading .vinyl-wrapper{
  opacity:0!important;
}
.record-scene.ready .vinyl-wrapper{
  opacity:1;
}

</style>
</head>
<body>
<div id="bootCover" style="position:fixed;inset:0;background:#000;z-index:999999;opacity:1;transition:opacity .35s ease;pointer-events:none;"></div>
<div class="container">
  <div class="artist">G-DRAGON</div>
  <div class="song" id="songName">🌼 SURPRISE ME</div>
  <div class="record-scene initial-loading">
    <div class="sleeve-layer sleeve-back" id="sleeveBack"></div>
    <div class="vinyl-wrapper inside hidden" id="vinylWrapper" aria-label="vinyl controls">
      <div class="vinyl" id="vinyl">
        <div class="album-art" id="albumArt"></div>
        <div class="center-label"></div>
        <div class="grooves"></div>
        <div class="spindle"></div>
      </div>
    </div>
    <div class="sleeve-layer sleeve-top" id="sleeveTop"></div>
    <div class="tonearm raised idle-hidden" id="tonearm">
      <div class="tonearm-base"></div><div class="tonearm-pivot"></div><div class="tonearm-bar"></div><div class="counterweight"></div><div class="headshell"></div><div class="stylus"></div>
    </div>
  </div>
  <div class="subtitle">SCAN • TAP • DISCOVER</div>
  <div class="progress-area"><div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div><div class="time-row"><span id="currentTime">0:00</span><span id="durationTime">0:00</span></div></div>
  <button class="random-btn" id="surpriseBtn" onclick="surpriseMe()">🌼 SURPRISE ME</button>
  <audio id="audioPlayer" preload="auto"></audio>
</div>
<script>
const gdImages=["images/Gdragon1.jpg","images/Gdragon2.jpg"];
const songs=[
{title:"A Boy",file:"music/A_Boy-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"BLACK",file:"music/Black-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Breathe",file:"music/Breathe-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"Bullshit",file:"music/Bullshit-GDragon.mp3",images:["images/Untitled,(2014)1.jpg","images/Untitled,(2014)2.jpg"]},
{title:"COUP D'ETAT",file:"music/Coup_d'Etat-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Crayon",file:"music/Crayon-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"CROOKED",file:"music/Crooked-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Heartbreaker",file:"music/Heartbreaker-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"HOME SWEET HOME",file:"music/Home_Sweet_Home-GDragon.mp3",images:["images/ubermensch1.jpg","images/ubermensch2.png"]},
{title:"Missing You",file:"music/Missing_You-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"One Of A Kind",file:"music/One_Of_A_Kind-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"POWER",file:"music/Power-GDragon.mp3",images:["images/Power1.jpg","images/Power2.jpg"]},
{title:"R.O.D.",file:"music/R.O.D-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"That XX",file:"music/That_XX-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"Today",file:"music/Today-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"TOO BAD",file:"music/Too_Bad-GDragon.mp3",images:["images/ubermensch1.jpg","images/ubermensch2.png"]},
{title:"Untitled, 2014",file:"music/Untitled,2014-GDragon.mp3",images:["images/Untitled,(2014)1.jpg","images/Untitled,(2014)2.jpg"]},
{title:"WHO YOU?",file:"music/Who_You_-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Window",file:"music/Window-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"Without You",file:"music/Without_You-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]}
];

function normalizeSongImages(){
  const albumMap = {
    "A Boy":["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"],
    "Breathe":["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"],
    "Heartbreaker":["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"],
    "Window":["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"],

    "Crayon":["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"],
    "That XX":["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"],
    "One Of A Kind":["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"],
    "Missing You":["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"],
    "Today":["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"],
    "Without You":["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"],

    "BLACK":["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"],
    "COUP D'ETAT":["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"],
    "CROOKED":["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"],
    "WHO YOU?":["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"],
    "R.O.D.":["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"],

    "POWER":["images/Power1.jpg","images/Power2.jpg"],

    "Untitled, 2014":["images/Untitled,(2014)1.jpg","images/Untitled,(2014)2.jpg"],
    "Bullshit":["images/Untitled,(2014)1.jpg","images/Untitled,(2014)2.jpg"],

    "HOME SWEET HOME":["images/ubermensch1.jpg","images/ubermensch2.png"],
    "TOO BAD":["images/ubermensch1.jpg","images/ubermensch2.png"]
  };
  songs.forEach(song=>{
    if(!song.images || !song.images.length){
      song.images = albumMap[song.title] || gdImages;
    }
  });
}
normalizeSongImages();


const player=document.getElementById("audioPlayer");
const songName=document.getElementById("songName");
const vinyl=document.getElementById("vinyl");
const vinylWrapper=document.getElementById("vinylWrapper");
const albumArt=document.getElementById("albumArt");
const tonearm=document.getElementById("tonearm");
const surpriseBtn=document.getElementById("surpriseBtn");
const sleeveBack=document.getElementById("sleeveBack");
const sleeveTop=document.getElementById("sleeveTop");
const progressBar=document.getElementById("progressBar");
const progressFill=document.getElementById("progressFill");
const currentTimeEl=document.getElementById("currentTime");
const durationTimeEl=document.getElementById("durationTime");
let currentSong=null, albumMode=true, imageIndex=0, imageTimer=null, playlist=[], playlistIndex=0, playlistStarted=false, isTransitioning=false;
function wait(ms){return new Promise(r=>setTimeout(r,ms));}
function shuffle(array){const arr=[...array];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function buildPlaylist(){playlist=shuffle(songs);playlistIndex=0;}
function nextPlaylistSong(){if(!playlistStarted){buildPlaylist();playlistStarted=true;return playlist[playlistIndex];}playlistIndex++;if(playlistIndex>=playlist.length)buildPlaylist();return playlist[playlistIndex];}
function currentImages(){
  if(!currentSong) return gdImages;
  if(albumMode){
    if(currentSong.images && currentSong.images.length){
      return currentSong.images;
    }
    return gdImages;
  }
  return gdImages;
});

</script>
</body>
</html>
