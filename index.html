<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>G-DRAGON NFC Player</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
overflow:hidden;
}

.container{
width:100%;
max-width:500px;
text-align:center;
}

.artist{
font-size:16px;
letter-spacing:6px;
color:#999;
margin-bottom:20px;
}

.song{
font-size:34px;
font-weight:700;
margin-bottom:30px;
min-height:80px;
display:flex;
align-items:center;
justify-content:center;
padding:0 20px;
}

.vinyl{
width:280px;
height:280px;
margin:0 auto 25px auto;
border-radius:50%;
position:relative;

background:
repeating-radial-gradient(
circle,
#111 0px,
#222 3px,
#111 6px,
#000 10px
);

border:8px solid #333;

animation:spin 4s linear infinite;

box-shadow:
0 0 30px rgba(255,255,255,.08);
}

.vinyl::before{
content:"";
position:absolute;

width:90px;
height:90px;

background:#111;

border-radius:50%;

top:50%;
left:50%;

transform:translate(-50%,-50%);
}

.vinyl::after{
content:"GD";

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:28px;
font-weight:bold;
color:white;
}

.subtitle{
color:#777;
font-size:13px;
letter-spacing:3px;
margin-bottom:25px;
}

.random-btn{
border:none;
padding:18px 35px;
border-radius:999px;
cursor:pointer;

font-size:16px;
font-weight:700;

background:white;
color:black;

transition:.2s;
}

.random-btn:hover{
transform:scale(1.05);
}

audio{
display:none;
}

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

</style>

</head>

<body>

<div class="container">

<div class="artist">
G-DRAGON
</div>

<div class="song" id="songName">
Tap Below
</div>

<div class="vinyl"></div>

<div class="subtitle">
TODAY'S RANDOM PICK
</div>

<button class="random-btn" onclick="pickSong()">
🎲 PLAY RANDOM SONG
</button>

<audio id="audioPlayer"></audio>

</div>

<script>

let currentSong;

const songs = [

{ title:"A Boy", file:"music/A_Boy-GDragon.mp3" },
{ title:"BLACK", file:"music/Black-GDragon.mp3" },
{ title:"Breathe", file:"music/Breathe-GDragon.mp3" },
{ title:"Bullshit", file:"music/Bullshit-GDragon.mp3" },
{ title:"COUP D'ETAT", file:"music/Coup_d'Etat-GDragon.mp3" },
{ title:"Crayon", file:"music/Crayon-GDragon.mp3" },
{ title:"CROOKED", file:"music/Crooked-GDragon.mp3" },
{ title:"Heartbreaker", file:"music/Heartbreaker-GDragon.mp3" },
{ title:"HOME SWEET HOME", file:"music/Home_Sweet_Home-GDragon.mp3" },
{ title:"Missing You", file:"music/Missing_You-GDragon.mp3" },
{ title:"One Of A Kind", file:"music/One_Of_A_Kind-GDragon.mp3" },
{ title:"POWER", file:"music/Power-GDragon.mp3" },
{ title:"R.O.D.", file:"music/R.O.D-GDragon.mp3" },
{ title:"That XX", file:"music/That_XX-GDragon.mp3" },
{ title:"Today", file:"music/Today-GDragon.mp3" },
{ title:"TOO BAD", file:"music/Too_Bad-GDragon.mp3" },
{ title:"Untitled, 2014", file:"music/Untitled,2014-GDragon.mp3" },
{ title:"WHO YOU?", file:"music/Who_You_-GDragon.mp3" },
{ title:"Window", file:"music/Window-GDragon.mp3" },
{ title:"Without You", file:"music/Without_You-GDragon.mp3" }

];

function pickSong(){

currentSong =
songs[Math.floor(Math.random() * songs.length)];

document.getElementById("songName").innerText =
currentSong.title;

const player =
document.getElementById("audioPlayer");

player.pause();

player.src =
currentSong.file;

player.load();

player.play().catch(() => {
console.log("Playback blocked");
});

}

</script>

</body>
</html>
