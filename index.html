<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>G-DRAGON Surprise Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
:root{--vinyl-size:280px;--sleeve-size:250px;--sleeve-park-x:-145px;--record-in-sleeve-x:-118px;}
body{background:radial-gradient(circle at top,rgba(255,255,255,.08),transparent 32%),#000;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;overflow-x:hidden;}
.container{width:100%;max-width:520px;text-align:center;}
.artist{font-size:16px;letter-spacing:6px;color:#999;margin-bottom:20px;}
.song{font-size:34px;font-weight:800;margin-bottom:20px;min-height:80px;display:flex;align-items:center;justify-content:center;padding:0 20px;line-height:1.05;}
.record-scene{width:100%;max-width:380px;height:340px;margin:0 auto 18px;position:relative;overflow:visible;}
.sleeve-layer{position:absolute;width:var(--sleeve-size);height:var(--sleeve-size);left:50%;top:45px;--sleeve-x:0px;--back-offset-x:0px;--back-offset-y:0px;transform:translate(calc(-50% + var(--sleeve-x) + var(--back-offset-x)),var(--back-offset-y));background-size:cover;background-position:center;background-repeat:no-repeat;pointer-events:none;opacity:1;transition:opacity .45s ease,transform .72s cubic-bezier(.2,.85,.2,1);}
.sleeve-back{background-image:url("images/sleeve-back.jpg");z-index:2;--back-offset-x:10px;--back-offset-y:5px;filter:brightness(.68) drop-shadow(0 25px 45px rgba(0,0,0,.7));}
.sleeve-top{background-image:url("images/sleeve-top.png");z-index:6;filter:drop-shadow(0 15px 30px rgba(0,0,0,.45));}
.sleeve-hidden{opacity:0;}
.sleeve-park-left{--sleeve-x:var(--sleeve-park-x);opacity:1;}
.sleeve-no-transition{transition:none!important;}
.vinyl-wrapper{width:var(--vinyl-size);height:var(--vinyl-size);position:absolute;left:50%;top:30px;transform:translateX(-50%) scale(1);transform-origin:center center;cursor:pointer;z-index:4;transition:transform .9s cubic-bezier(.18,.95,.22,1),opacity .25s ease,filter .7s ease;}
.vinyl-wrapper.hidden{opacity:0;}
.vinyl-wrapper.picked-up{transform:translateX(-50%) translateY(-18px) scale(.96);filter:brightness(1.06) drop-shadow(0 26px 36px rgba(0,0,0,.55));}
.vinyl-wrapper.inside-sleeve{transform:translateX(calc(-50% + var(--record-in-sleeve-x))) translateY(0) scale(.86);filter:brightness(.84);}
.vinyl-wrapper.inside-sleeve.picked-up{transform:translateX(calc(-50% + var(--record-in-sleeve-x))) translateY(-18px) scale(.88);filter:brightness(.98) drop-shadow(0 24px 34px rgba(0,0,0,.58));}
.vinyl{width:100%;height:100%;border-radius:50%;position:relative;overflow:hidden;background:#050505;animation:spin 4s linear infinite;animation-play-state:paused;box-shadow:0 30px 65px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.08),inset 0 0 45px rgba(255,255,255,.045),inset 0 0 70px rgba(0,0,0,.75);}
.vinyl.playing{animation-play-state:running;}
.album-art{position:absolute;inset:0;border-radius:50%;background-size:cover;background-position:center;opacity:0;transition:opacity .75s ease;z-index:1;}
.album-art.visible{opacity:1;}
.grooves{position:absolute;inset:0;border-radius:50%;background:repeating-radial-gradient(circle,transparent 0,transparent 3px,rgba(0,0,0,.22) 4px,rgba(0,0,0,.22) 5px),radial-gradient(circle at 31% 23%,rgba(255,255,255,.24),transparent 17%),linear-gradient(130deg,transparent 8%,rgba(255,255,255,.18) 20%,transparent 34%,transparent 64%,rgba(255,255,255,.07) 75%,transparent 88%);mix-blend-mode:screen;z-index:2;pointer-events:none;}
.vinyl::after{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,transparent 0 36%,rgba(0,0,0,.12) 45%,rgba(0,0,0,.4) 75%,rgba(0,0,0,.72) 100%),linear-gradient(135deg,rgba(255,255,255,.16),transparent 25%,transparent 70%,rgba(255,255,255,.08));z-index:3;pointer-events:none;}
.spindle{position:absolute;width:11px;height:11px;border-radius:50%;background:#080808;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;border:1px solid rgba(255,255,255,.35);box-shadow:0 0 10px rgba(0,0,0,.85);}
.tonearm{position:absolute;width:128px;height:88px;right:-2px;top:8px;z-index:10;transform-origin:106px 18px;transform:rotate(-13deg);opacity:1;transition:transform .55s cubic-bezier(.2,.85,.2,1),opacity .35s ease;pointer-events:none;}
.tonearm.raised{transform:rotate(18deg);}
.tonearm.idle-hidden{opacity:0;}
.tonearm-base{position:absolute;width:42px;height:42px;right:0;top:0;border-radius:50%;background:radial-gradient(circle at 35% 30%,#777,#1b1b1b 60%,#050505);box-shadow:0 10px 24px rgba(0,0,0,.75);}
.tonearm-bar{position:absolute;width:105px;height:7px;right:28px;top:18px;border-radius:99px;background:linear-gradient(90deg,#d6d6d6,#777,#e5e5e5);transform:rotate(-28deg);transform-origin:right center;box-shadow:0 7px 16px rgba(0,0,0,.55);}
.stylus{position:absolute;width:20px;height:26px;left:3px;top:52px;transform:rotate(-24deg);background:linear-gradient(145deg,#d7d7d7,#444);clip-path:polygon(22% 0,100% 14%,68% 100%,0 86%);filter:drop-shadow(0 5px 8px rgba(0,0,0,.7));}
.subtitle{color:#777;font-size:12px;letter-spacing:3.5px;margin-bottom:18px;}
.progress-area{width:100%;max-width:340px;margin:0 auto 22px;}
.progress-bar{width:100%;height:5px;border-radius:999px;background:rgba(255,255,255,.15);overflow:hidden;cursor:pointer;}
.progress-fill{width:0%;height:100%;border-radius:inherit;background:#fff;transition:width .12s linear;}
.time-row{display:flex;justify-content:space-between;margin-top:8px;color:#777;font-size:12px;letter-spacing:1px;}
.random-btn{border:none;padding:18px 36px;border-radius:999px;cursor:pointer;font-size:16px;font-weight:800;background:#fff;color:#000;box-shadow:0 15px 35px rgba(255,255,255,.12);transition:transform .18s ease,opacity .18s ease;}
.random-btn:active{transform:scale(.97);}
.random-btn:disabled{opacity:.55;cursor:not-allowed;}
audio{display:none;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@media(max-width:430px){:root{--vinyl-size:260px;--sleeve-size:230px;--sleeve-park-x:-130px;--record-in-sleeve-x:-108px}.record-scene{height:322px}.sleeve-layer{top:48px}.vinyl-wrapper{top:34px}.vinyl-wrapper.inside-sleeve{transform:translateX(calc(-50% + var(--record-in-sleeve-x))) scale(.86)}.vinyl-wrapper.inside-sleeve.picked-up{transform:translateX(calc(-50% + var(--record-in-sleeve-x))) translateY(-16px) scale(.88)}.vinyl-wrapper.picked-up{transform:translateX(-50%) translateY(-16px) scale(.96)}.tonearm{right:-8px;top:4px;transform:rotate(-13deg) scale(.9)}.tonearm.raised{transform:rotate(20deg) scale(.9)}}
</style>
</head>
<body>
<div class="container">
  <div class="artist">G-DRAGON</div>
  <div class="song" id="songName">🌼 SURPRISE ME</div>
  <div class="record-scene">
    <div class="sleeve-layer sleeve-back" id="sleeveBack"></div>
    <div class="vinyl-wrapper hidden inside-sleeve" id="vinylWrapper" aria-label="vinyl controls">
      <div class="vinyl" id="vinyl">
        <div class="album-art visible" id="albumArtA"></div>
        <div class="album-art" id="albumArtB"></div>
        <div class="grooves"></div>
        <div class="spindle"></div>
      </div>
    </div>
    <div class="sleeve-layer sleeve-top" id="sleeveTop"></div>
    <div class="tonearm raised idle-hidden" id="tonearm">
      <div class="tonearm-base"></div>
      <div class="tonearm-bar"></div>
      <div class="stylus"></div>
    </div>
  </div>
  <div class="subtitle">SCAN • TAP • DISCOVER</div>
  <div class="progress-area">
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="time-row"><span id="currentTime">0:00</span><span id="durationTime">0:00</span></div>
  </div>
  <button class="random-btn" id="surpriseBtn" onclick="surpriseMe()">🌼 SURPRISE ME</button>
  <audio id="audioPlayer" preload="auto"></audio>
</div>
<script>
const gdImages=["images/Gdragon1.jpg","images/Gdragon2.jpg"];
const songs=[
{title:"A Boy",file:"music/A_Boy-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"BLACK",file:"music/Black-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Breathe",file:"music/Breathe-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"Bullshit",file:"music/Bullshit-GDragon.mp3",images:["images/Untitled,(2014)1.jpg","images/Untitled,(2014)2.jpg"]},
{title:"COUP D'ETAT",file:"music/Coup_d'Etat-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Crayon",file:"music/Crayon-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"CROOKED",file:"music/Crooked-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Heartbreaker",file:"music/Heartbreaker-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"HOME SWEET HOME",file:"music/Home_Sweet_Home-GDragon.mp3",images:["images/ubermensch1.jpg","images/ubermensch2.png"]},
{title:"Missing You",file:"music/Missing_You-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"One Of A Kind",file:"music/One_Of_A_Kind-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"POWER",file:"music/Power-GDragon.mp3",images:["images/Power1.jpg","images/Power2.jpg"]},
{title:"R.O.D.",file:"music/R.O.D-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"That XX",file:"music/That_XX-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"Today",file:"music/Today-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"TOO BAD",file:"music/Too_Bad-GDragon.mp3",images:["images/ubermensch1.jpg","images/ubermensch2.png"]},
{title:"Untitled, 2014",file:"music/Untitled,2014-GDragon.mp3",images:["images/Untitled,(2014)1.jpg","images/Untitled,(2014)2.jpg"]},
{title:"WHO YOU?",file:"music/Who_You_-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Window",file:"music/Window-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"Without You",file:"music/Without_You-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]}
];
const player=document.getElementById("audioPlayer"),songName=document.getElementById("songName"),vinyl=document.getElementById("vinyl"),vinylWrapper=document.getElementById("vinylWrapper"),tonearm=document.getElementById("tonearm"),surpriseBtn=document.getElementById("surpriseBtn"),sleeveBack=document.getElementById("sleeveBack"),sleeveTop=document.getElementById("sleeveTop"),progressBar=document.getElementById("progressBar"),progressFill=document.getElementById("progressFill"),currentTimeEl=document.getElementById("currentTime"),durationTimeEl=document.getElementById("durationTime");
const artLayers=[document.getElementById("albumArtA"),document.getElementById("albumArtB")];
let currentSong=null,albumMode=true,imageIndex=0,imageTimer=null,activeArt=0,playlist=[],playlistIndex=0,playlistStarted=false,isTransitioning=false;
function wait(ms){return new Promise(r=>setTimeout(r,ms));}
function shuffle(array){const arr=[...array];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function buildPlaylist(){playlist=shuffle(songs);playlistIndex=0;}
function nextPlaylistSong(){if(!playlistStarted){buildPlaylist();playlistStarted=true;return playlist[playlistIndex];}playlistIndex++;if(playlistIndex>=playlist.length){buildPlaylist();}return playlist[playlistIndex];}
function currentImages(){return albumMode&&currentSong?currentSong.images:gdImages;}
function setDiscImage(url,instant=false){if(instant){artLayers[0].style.backgroundImage=`url('${url}')`;artLayers[1].style.backgroundImage=`url('${url}')`;artLayers[0].classList.add("visible");artLayers[1].classList.remove("visible");activeArt=0;return;}const next=activeArt===0?1:0;artLayers[next].style.backgroundImage=`url('${url}')`;artLayers[next].classList.add("visible");artLayers[activeArt].classList.remove("visible");activeArt=next;}
function updateImage(instant=false){const imgs=currentImages();const safeIndex=((imageIndex%imgs.length)+imgs.length)%imgs.length;setDiscImage(imgs[safeIndex],instant);}
function startImageRotation(){clearInterval(imageTimer);imageTimer=setInterval(()=>{if(isTransitioning||!currentSong||player.paused)return;imageIndex=(imageIndex+1)%currentImages().length;updateImage(false);},5000);}
function forceRenderCurrentMode(){clearInterval(imageTimer);if(!currentSong){updateImage(true);return;}const imgs=currentImages();imageIndex=imageIndex%imgs.length;setDiscImage(imgs[imageIndex],true);if(!player.paused&&!isTransitioning)startImageRotation();}
function toggleImage(){if(!currentSong||isTransitioning)return;clearInterval(imageTimer);imageIndex=(imageIndex+1)%currentImages().length;updateImage(false);if(!player.paused)startImageRotation();}
function setSleeveVisible(show){sleeveBack.classList.toggle("sleeve-hidden",!show);sleeveTop.classList.toggle("sleeve-hidden",!show);}
function setSleeveParked(parked,transition=true){[sleeveBack,sleeveTop].forEach(el=>{el.classList.toggle("sleeve-no-transition",!transition);el.classList.toggle("sleeve-park-left",parked);});}
function resetProgress(){progressFill.style.width="0%";currentTimeEl.innerText="0:00";durationTimeEl.innerText="0:00";}
function prepareAudio(song){return new Promise(resolve=>{let done=false;function finish(){if(done)return;done=true;player.removeEventListener("canplay",finish);player.removeEventListener("error",finish);resolve();}player.addEventListener("canplay",finish,{once:true});player.addEventListener("error",finish,{once:true});player.src=song.file;player.load();setTimeout(finish,3500);});}
async function pullOutFirstSong(song){
  if(isTransitioning)return;
  isTransitioning=true;
  surpriseBtn.disabled=true;
  clearInterval(imageTimer);
  resetProgress();

  currentSong=song;
  albumMode=true;
  imageIndex=0;
  updateImage(true);
  songName.innerText="🌼 Selecting...";

  // First page open: sleeve starts in the middle.
  setSleeveVisible(true);
  setSleeveParked(false,false);
  vinylWrapper.classList.add("inside-sleeve","hidden");
  vinylWrapper.classList.remove("picked-up");
  tonearm.classList.add("raised","idle-hidden");

  const audioReady=prepareAudio(song);

  await wait(320);

  // After first tap, move the sleeve to the left. From now on it stays there.
  setSleeveParked(true,true);
  await wait(760);

  // Pull the record out from between the back sleeve and the front sleeve.
  vinylWrapper.classList.remove("hidden");
  await wait(100);
  vinylWrapper.classList.add("picked-up");
  await wait(220);
  vinylWrapper.classList.remove("inside-sleeve");
  await wait(900);
  vinylWrapper.classList.remove("picked-up");

  await audioReady;
  tonearm.classList.remove("idle-hidden");
  await wait(100);
  tonearm.classList.remove("raised");
  await wait(360);

  songName.innerText=song.title;
  try{
    player.currentTime=0;
    await player.play();
  }catch(e){
    songName.innerText=song.title+" • tap vinyl to play";
  }

  startImageRotation();
  surpriseBtn.disabled=false;
  isTransitioning=false;
}

async function transitionToSong(song){
  if(isTransitioning)return;
  if(!currentSong){await pullOutFirstSong(song);return;}

  isTransitioning=true;
  surpriseBtn.disabled=true;
  clearInterval(imageTimer);
  player.pause();
  vinyl.classList.remove("playing");
  tonearm.classList.add("raised");
  songName.innerText="🌼 Selecting...";

  // Keep sleeve on the left. It does not move until the record is inside.
  setSleeveVisible(true);
  setSleeveParked(true,false);

  await wait(260);

  // Pick record up, then slide it into the sleeve on the left.
  vinylWrapper.classList.add("picked-up");
  await wait(280);
  vinylWrapper.classList.add("inside-sleeve");
  await wait(900);
  vinylWrapper.classList.remove("picked-up");
  await wait(180);
  vinylWrapper.classList.add("hidden");

  const audioReady=prepareAudio(song);
  currentSong=song;
  albumMode=true;
  imageIndex=0;
  updateImage(true);

  await wait(160);

  // Pull the next record out from the same left sleeve.
  vinylWrapper.classList.remove("hidden");
  await wait(100);
  vinylWrapper.classList.add("picked-up");
  await wait(240);
  vinylWrapper.classList.remove("inside-sleeve");
  await wait(900);
  vinylWrapper.classList.remove("picked-up");

  await audioReady;
  tonearm.classList.remove("raised");
  await wait(360);
  songName.innerText=song.title;

  try{
    player.currentTime=0;
    await player.play();
  }catch(e){
    songName.innerText=song.title+" • tap vinyl to play";
  }

  startImageRotation();
  surpriseBtn.disabled=false;
  isTransitioning=false;
}
function surpriseMe(){transitionToSong(nextPlaylistSong());}
player.addEventListener("ended",()=>transitionToSong(nextPlaylistSong()));
player.addEventListener("play",()=>{vinyl.classList.add("playing");tonearm.classList.remove("raised");if(currentSong&&!isTransitioning)startImageRotation();});
player.addEventListener("pause",()=>{vinyl.classList.remove("playing");tonearm.classList.add("raised");clearInterval(imageTimer);});
function formatTime(seconds){if(!Number.isFinite(seconds))return"0:00";const m=Math.floor(seconds/60);const s=Math.floor(seconds%60).toString().padStart(2,"0");return `${m}:${s}`;}
player.addEventListener("timeupdate",()=>{if(!Number.isFinite(player.duration)||player.duration<=0)return;progressFill.style.width=`${(player.currentTime/player.duration)*100}%`;currentTimeEl.innerText=formatTime(player.currentTime);durationTimeEl.innerText=formatTime(player.duration);});
player.addEventListener("loadedmetadata",()=>durationTimeEl.innerText=formatTime(player.duration));
progressBar.addEventListener("click",event=>{if(!Number.isFinite(player.duration)||player.duration<=0)return;const rect=progressBar.getBoundingClientRect();const percent=(event.clientX-rect.left)/rect.width;player.currentTime=Math.max(0,Math.min(player.duration,player.duration*percent));});
let holdTimer=null,holdTriggered=false,tapCount=0,tapTimer=null;
function startHold(){if(isTransitioning)return;holdTriggered=false;holdTimer=setTimeout(()=>{if(!currentSong)return;holdTriggered=true;albumMode=!albumMode;imageIndex=0;forceRenderCurrentMode();songName.innerText=albumMode?"💿 ALBUM MODE":"👑 G-DRAGON MODE";setTimeout(()=>{if(currentSong&&!isTransitioning)songName.innerText=currentSong.title;},1700);},1000);}
function stopHold(){clearTimeout(holdTimer);}
function handleTap(){if(isTransitioning)return;tapCount++;clearTimeout(tapTimer);tapTimer=setTimeout(()=>{if(tapCount===1){if(!currentSong)return;if(player.paused){player.play().catch(()=>{});}else{player.pause();}}else{toggleImage();}tapCount=0;},250);}
vinylWrapper.addEventListener("mousedown",startHold);vinylWrapper.addEventListener("mouseup",()=>{stopHold();if(holdTriggered)return;handleTap();});vinylWrapper.addEventListener("mouseleave",stopHold);
vinylWrapper.addEventListener("touchstart",e=>{e.preventDefault();startHold();},{passive:false});vinylWrapper.addEventListener("touchend",e=>{e.preventDefault();stopHold();if(holdTriggered)return;handleTap();},{passive:false});vinylWrapper.addEventListener("touchmove",()=>stopHold(),{passive:true});
updateImage(true);setSleeveParked(false,false);setSleeveVisible(true);
</script>
</body>
</html>
