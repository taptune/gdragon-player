<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>G-DRAGON Vinyl</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
text-align:center;
width:100%;
max-width:500px;
padding:20px;
}

.artist{
font-size:18px;
letter-spacing:6px;
color:#888;
margin-bottom:20px;
}

.song{
font-size:32px;
font-weight:bold;
margin-bottom:30px;
padding:0 20px;
}

.vinyl{
width:280px;
height:280px;
margin:auto;
border-radius:50%;
position:relative;

background:
repeating-radial-gradient(
circle,
#111 0px,
#222 3px,
#111 6px,
#000 9px
);

border:8px solid #333;

animation:spin 3s linear infinite;

box-shadow:
0 0 30px rgba(255,255,255,0.08);
}

.vinyl::before{
content:"";
position:absolute;

width:100px;
height:100px;

background:#111;

border-radius:50%;

top:50%;
left:50%;

transform:translate(-50%,-50%);
}

.vinyl::after{
content:"GD";

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:26px;
font-weight:bold;
color:white;
}

.subtitle{
margin-top:25px;
color:#666;
font-size:14px;
letter-spacing:2px;
}

button{
margin-top:25px;
padding:16px 35px;

border:none;
border-radius:999px;

background:white;
color:black;

font-weight:bold;
font-size:16px;

cursor:pointer;
}

button:hover{
opacity:.9;
}

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

</style>

</head>

<body>

<div class="container">

<div class="artist">
G-DRAGON
</div>

<div class="song" id="songName">
Loading...
</div>

<div class="vinyl"></div>

<div class="subtitle">
TODAY'S RANDOM PICK
</div>

<button onclick="pickSong()">
🎲 RANDOM SONG
</button>

</div>

<script>

const songs = [

"CROOKED",
"That XX",
"Crayon",
"WHO YOU?",
"Heartbreaker",
"One Of A Kind",
"Missing You",
"TOO BAD",
"Untitled, 2014",
"BLACK",
"Without You",
"POWER",
"R.O.D.",
"COUP D'ETAT",
"A Boy",
"TAKE ME",
"Today",
"GO",
"DRAMA",
"Breathe",
"SHAKE THE WORLD",
"HOME SWEET HOME",
"IBELONGIIU",
"RUNAWAY",
"NILIRIA",
"Hello",
"BONAMANA",
"GYRO-DROP",
"I LOVE IT",
"The Leaders"

];

function pickSong(){

const randomSong =
songs[Math.floor(Math.random() * songs.length)];

document.getElementById("songName").innerText =
randomSong;

}

pickSong();

</script>
  
<h2>MP3 Test</h2>

<audio controls>
  <source src="Crooked-GDragon.mp3" type="audio/mpeg">
</audio>
  
</body>

</html>
