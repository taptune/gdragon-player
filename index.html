<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>G-DRAGON Surprise Player</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --vinyl-size:280px;
  --sleeve-size:215px;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 50% 18%,rgba(255,255,255,.08),transparent 28%),
    radial-gradient(circle at 50% 75%,rgba(120,120,120,.08),transparent 35%),
    #000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:22px;
  overflow-x:hidden;
}

.container{
  width:100%;
  max-width:520px;
  text-align:center;
}

.artist{
  font-size:15px;
  letter-spacing:7px;
  color:#999;
  margin-bottom:18px;
}

.song{
  font-size:clamp(28px,7vw,38px);
  font-weight:800;
  line-height:1.05;
  margin-bottom:22px;
  min-height:82px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 20px;
}

.record-scene{
  width:100%;
  height:340px;
  max-width:380px;
  margin:0 auto 20px;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:visible;
}

/* ---------- Sleeve: two real image layers only ---------- */
.sleeve-part{
  position:absolute;
  width:var(--sleeve-size);
  height:var(--sleeve-size);
  left:4px;
  top:62px;
  opacity:0;
  transform:translateX(0);
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  border-radius:7px;
  pointer-events:none;
  transition:
    transform .68s cubic-bezier(.2,.9,.2,1),
    opacity .45s ease;
}

.sleeve-back{
  background-image:url("images/sleeve-back.jpg");
  z-index:4;
  box-shadow:
    0 24px 48px rgba(0,0,0,.72),
    inset 0 0 25px rgba(255,255,255,.035);
}

.sleeve-top{
  background-image:url("images/sleeve-top.jpg");
  z-index:8;
  filter:drop-shadow(0 12px 28px rgba(0,0,0,.45));
}

/* ---------- Main Vinyl ---------- */
.vinyl-wrapper{
  width:var(--vinyl-size);
  height:var(--vinyl-size);
  position:absolute;
  left:50%;
  top:30px;
  transform:translate(-50%,0) scale(1);
  transform-origin:center center;
  cursor:pointer;
  z-index:6;
  opacity:1;
  transition:
    transform .88s cubic-bezier(.18,.95,.22,1),
    opacity .22s ease,
    filter .88s ease;
}

.vinyl-wrapper.in-sleeve{
  transform:translate(calc(-50% - 68px),0) scale(.70);
  filter:brightness(.82);
}

.vinyl-wrapper.hidden{
  opacity:0;
}

.vinyl{
  width:100%;
  height:100%;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  background:#050505;
  animation:spin 4s linear infinite;
  animation-play-state:paused;
  box-shadow:
    0 30px 65px rgba(0,0,0,.78),
    0 0 0 1px rgba(255,255,255,.08),
    inset 0 0 40px rgba(255,255,255,.045),
    inset 0 0 65px rgba(0,0,0,.75);
}

.vinyl.playing{
  animation-play-state:running;
}

.album-art{
  position:absolute;
  inset:0;
  border-radius:50%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity .8s ease;
  z-index:1;
}

.album-art.visible{
  opacity:1;
}

.vinyl-grooves{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:
    repeating-radial-gradient(circle,transparent 0,transparent 3px,rgba(0,0,0,.28) 4px,rgba(0,0,0,.28) 5px),
    radial-gradient(circle at 30% 22%,rgba(255,255,255,.23),transparent 16%),
    linear-gradient(120deg,transparent 8%,rgba(255,255,255,.16) 18%,transparent 32%,transparent 62%,rgba(255,255,255,.08) 72%,transparent 86%);
  mix-blend-mode:screen;
  opacity:.78;
  z-index:2;
  pointer-events:none;
}

.vinyl::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:
    radial-gradient(circle,transparent 0 34%,rgba(0,0,0,.08) 45%,rgba(0,0,0,.36) 74%,rgba(0,0,0,.68) 100%),
    linear-gradient(135deg,rgba(255,255,255,.18),transparent 24%,transparent 70%,rgba(255,255,255,.07));
  z-index:3;
  pointer-events:none;
}

/* Small center only. No image here, so it will not cover GD's face. */
.center-label{
  position:absolute;
  width:38px;
  height:38px;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:
    radial-gradient(circle at 38% 30%,rgba(255,255,255,.28),rgba(20,20,20,.72) 42%,rgba(0,0,0,.92));
  border:1px solid rgba(255,255,255,.16);
  z-index:4;
  box-shadow:
    0 0 0 1px rgba(0,0,0,.8),
    0 0 16px rgba(0,0,0,.85);
}

.spindle{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#0b0b0b;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:5;
  border:1px solid #777;
  box-shadow:0 0 8px rgba(255,255,255,.2);
}

/* ---------- Tonearm ---------- */
.tonearm{
  position:absolute;
  width:128px;
  height:88px;
  right:-2px;
  top:8px;
  z-index:12;
  transform-origin:106px 18px;
  transform:rotate(18deg);
  transition:transform .55s cubic-bezier(.2,.85,.2,1);
  pointer-events:none;
}

.tonearm.raised{
  transform:rotate(-13deg);
}

.tonearm-base{
  position:absolute;
  width:42px;
  height:42px;
  right:0;
  top:0;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 30%,#777,#1b1b1b 60%,#050505);
  box-shadow:0 10px 24px rgba(0,0,0,.75);
}

.tonearm-bar{
  position:absolute;
  width:105px;
  height:7px;
  right:28px;
  top:18px;
  border-radius:99px;
  background:linear-gradient(90deg,#d6d6d6,#777,#e5e5e5);
  transform:rotate(-28deg);
  transform-origin:right center;
  box-shadow:0 7px 16px rgba(0,0,0,.55);
}

.stylus{
  position:absolute;
  width:20px;
  height:26px;
  left:3px;
  top:52px;
  transform:rotate(-24deg);
  background:linear-gradient(145deg,#d7d7d7,#444);
  clip-path:polygon(22% 0,100% 14%,68% 100%,0 86%);
  filter:drop-shadow(0 5px 8px rgba(0,0,0,.7));
}

.subtitle{
  color:#777;
  font-size:12px;
  letter-spacing:3.5px;
  margin-bottom:18px;
}

.progress-area{
  width:100%;
  max-width:340px;
  margin:0 auto 22px;
}

.progress-bar{
  width:100%;
  height:5px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  overflow:hidden;
  cursor:pointer;
}

.progress-fill{
  width:0%;
  height:100%;
  border-radius:inherit;
  background:#fff;
  transition:width .12s linear;
}

.time-row{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  color:#777;
  font-size:12px;
  letter-spacing:1px;
}

.random-btn{
  border:none;
  padding:18px 36px;
  border-radius:999px;
  cursor:pointer;
  font-size:16px;
  font-weight:800;
  background:#fff;
  color:#000;
  box-shadow:0 15px 35px rgba(255,255,255,.12);
  transition:transform .18s ease, opacity .18s ease;
}

.random-btn:active{
  transform:scale(.97);
}

.random-btn:disabled{
  opacity:.55;
  cursor:not-allowed;
}

audio{
  display:none;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

@media (max-width:430px){
  :root{
    --vinyl-size:260px;
    --sleeve-size:198px;
  }

  .record-scene{
    height:322px;
  }

  .sleeve-part{
    left:-8px;
    top:63px;
  }

  .vinyl-wrapper{
    top:34px;
  }

  .vinyl-wrapper.in-sleeve{
    transform:translate(calc(-50% - 68px),0) scale(.69);
  }

  .tonearm{
    right:-8px;
    top:4px;
    transform:rotate(20deg) scale(.9);
  }

  .tonearm.raised{
    transform:rotate(-13deg) scale(.9);
  }
}
</style>
</head>

<body>
<div class="container">
  <div class="artist">G-DRAGON</div>
  <div class="song" id="songName">🌼 SURPRISE ME</div>

  <div class="record-scene" id="recordScene">
    <div class="sleeve-part sleeve-back" id="sleeveBack"></div>
    <div class="vinyl-wrapper" id="vinylWrapper" aria-label="vinyl record controls">
      <div class="vinyl" id="vinyl">
        <div class="album-art visible" id="albumArtA"></div>
        <div class="album-art" id="albumArtB"></div>
        <div class="vinyl-grooves"></div>
        <div class="center-label"></div>
        <div class="spindle"></div>
      </div>
    </div>
    <div class="sleeve-part sleeve-top" id="sleeveTop"></div>

    <div class="tonearm raised" id="tonearm">
      <div class="tonearm-base"></div>
      <div class="tonearm-bar"></div>
      <div class="stylus"></div>
    </div>
  </div>

  <div class="subtitle">SCAN • TAP • DISCOVER</div>

  <div class="progress-area">
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="durationTime">0:00</span>
    </div>
  </div>

  <button class="random-btn" id="surpriseBtn" onclick="surpriseMe()">🌼 SURPRISE ME</button>
  <audio id="audioPlayer" preload="auto"></audio>
</div>

<script>
const gdImages=[
  "images/Gdragon1.jpg",
  "images/Gdragon2.jpg"
];

const songs=[
{title:"A Boy",file:"music/A_Boy-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"BLACK",file:"music/Black-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Breathe",file:"music/Breathe-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"Bullshit",file:"music/Bullshit-GDragon.mp3",images:["images/Untitled,(2014)1.jpg","images/Untitled,(2014)2.jpg"]},
{title:"COUP D'ETAT",file:"music/Coup_d'Etat-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Crayon",file:"music/Crayon-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"CROOKED",file:"music/Crooked-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Heartbreaker",file:"music/Heartbreaker-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"HOME SWEET HOME",file:"music/Home_Sweet_Home-GDragon.mp3",images:["images/ubermensch1.jpg","images/ubermensch2.png"]},
{title:"Missing You",file:"music/Missing_You-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"One Of A Kind",file:"music/One_Of_A_Kind-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"POWER",file:"music/Power-GDragon.mp3",images:["images/Power1.jpg","images/Power2.jpg"]},
{title:"R.O.D.",file:"music/R.O.D-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"That XX",file:"music/That_XX-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"Today",file:"music/Today-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"TOO BAD",file:"music/Too_Bad-GDragon.mp3",images:["images/ubermensch1.jpg","images/ubermensch2.png"]},
{title:"Untitled, 2014",file:"music/Untitled,2014-GDragon.mp3",images:["images/Untitled,(2014)1.jpg","images/Untitled,(2014)2.jpg"]},
{title:"WHO YOU?",file:"music/Who_You_-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Window",file:"music/Window-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"Without You",file:"music/Without_You-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]}
];

const player=document.getElementById("audioPlayer");
const songName=document.getElementById("songName");
const vinyl=document.getElementById("vinyl");
const vinylWrapper=document.getElementById("vinylWrapper");
const tonearm=document.getElementById("tonearm");
const surpriseBtn=document.getElementById("surpriseBtn");
const albumArtA=document.getElementById("albumArtA");
const albumArtB=document.getElementById("albumArtB");
const artLayers=[albumArtA,albumArtB];
const sleeveBack=document.getElementById("sleeveBack");
const sleeveTop=document.getElementById("sleeveTop");
const sleeveParts=[sleeveBack,sleeveTop];
const progressBar=document.getElementById("progressBar");
const progressFill=document.getElementById("progressFill");
const currentTimeEl=document.getElementById("currentTime");
const durationTimeEl=document.getElementById("durationTime");

let currentSong=null;
let albumMode=true;
let imageIndex=0;
let imageTimer=null;
let activeArt=0;
let playlist=[];
let playlistIndex=0;
let playlistStarted=false;
let isTransitioning=false;

function wait(ms){
  return new Promise(resolve=>setTimeout(resolve,ms));
}

function shuffle(array){
  const arr=[...array];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function buildPlaylist(){
  playlist=shuffle(songs);
  playlistIndex=0;
}

function nextPlaylistSong(){
  if(!playlistStarted){
    buildPlaylist();
    playlistStarted=true;
    return playlist[playlistIndex];
  }

  playlistIndex++;

  if(playlistIndex>=playlist.length){
    buildPlaylist();
  }

  return playlist[playlistIndex];
}

function currentImages(){
  return (albumMode && currentSong) ? currentSong.images : gdImages;
}

function setDiscImage(url,instant=false){
  if(instant){
    artLayers[0].style.backgroundImage=`url('${url}')`;
    artLayers[1].style.backgroundImage=`url('${url}')`;
    artLayers[0].classList.add("visible");
    artLayers[1].classList.remove("visible");
    activeArt=0;
    return;
  }

  const next=activeArt===0 ? 1 : 0;
  artLayers[next].style.backgroundImage=`url('${url}')`;
  artLayers[next].classList.add("visible");
  artLayers[activeArt].classList.remove("visible");
  activeArt=next;
}

function updateImage(instant=false){
  const imgs=currentImages();
  const imageUrl=imgs[imageIndex % imgs.length];
  setDiscImage(imageUrl,instant);
}

function startImageRotation(){
  clearInterval(imageTimer);
  imageTimer=setInterval(()=>{
    if(isTransitioning || !currentSong) return;
    imageIndex=(imageIndex+1)%currentImages().length;
    updateImage(false);
  },5000);
}

function toggleImage(){
  if(!currentSong || isTransitioning) return;
  imageIndex=(imageIndex+1)%currentImages().length;
  updateImage(false);
}

function setSleeve(x,opacity,transition=true){
  sleeveParts.forEach(part=>{
    part.style.transition=transition
      ? "transform .68s cubic-bezier(.2,.9,.2,1), opacity .45s ease"
      : "none";
    part.style.transform=`translateX(${x})`;
    part.style.opacity=opacity;
  });
}

function resetProgress(){
  progressFill.style.width="0%";
  currentTimeEl.innerText="0:00";
  durationTimeEl.innerText="0:00";
}

function prepareAudio(song){
  return new Promise(resolve=>{
    let done=false;

    function finish(){
      if(done) return;
      done=true;
      player.removeEventListener("canplay",finish);
      player.removeEventListener("error",finish);
      resolve();
    }

    player.addEventListener("canplay",finish,{once:true});
    player.addEventListener("error",finish,{once:true});
    player.src=song.file;
    player.load();

    setTimeout(finish,3500);
  });
}

async function playSongDirect(song){
  if(isTransitioning) return;

  isTransitioning=true;
  surpriseBtn.disabled=true;
  clearInterval(imageTimer);
  resetProgress();

  currentSong=song;
  albumMode=true;
  imageIndex=0;
  updateImage(true);

  songName.innerText="🌼 Loading...";
  tonearm.classList.add("raised");

  await prepareAudio(song);

  tonearm.classList.remove("raised");
  await wait(420);

  songName.innerText=song.title;

  try{
    player.currentTime=0;
    await player.play();
  }catch(error){
    songName.innerText=song.title + " • tap vinyl to play";
  }

  startImageRotation();
  surpriseBtn.disabled=false;
  isTransitioning=false;
}

async function transitionToSong(nextSong){
  if(isTransitioning) return;

  if(!currentSong){
    await playSongDirect(nextSong);
    return;
  }

  isTransitioning=true;
  surpriseBtn.disabled=true;
  clearInterval(imageTimer);
  resetProgress();

  const audioReady=prepareAudio(nextSong);

  player.pause();
  vinyl.classList.remove("playing");
  tonearm.classList.add("raised");
  songName.innerText="🌼 Selecting...";

  // Old sleeve appears.
  setSleeve("0",1,true);
  await wait(470);

  // The real main record slides into the sleeve. No duplicate mini record.
  vinylWrapper.classList.remove("hidden");
  vinylWrapper.classList.add("in-sleeve");
  await wait(880);

  vinylWrapper.classList.add("hidden");
  await wait(120);

  // Old sleeve slides out.
  setSleeve("-150%",0,true);
  await wait(700);

  // Prepare new song image while hidden inside the new sleeve.
  currentSong=nextSong;
  albumMode=true;
  imageIndex=0;
  updateImage(true);
  vinylWrapper.classList.add("in-sleeve","hidden");

  // New sleeve starts offscreen, then slides in.
  setSleeve("-150%",0,false);
  await wait(40);
  setSleeve("0",1,true);
  await wait(720);

  // New record slides out from between sleeve-back and sleeve-top.
  vinylWrapper.classList.remove("hidden");
  await wait(90);
  vinylWrapper.classList.remove("in-sleeve");
  await wait(920);

  // Sleeve fades away.
  setSleeve("0",0,true);
  await wait(460);

  await audioReady;

  tonearm.classList.remove("raised");
  await wait(420);

  songName.innerText=nextSong.title;

  try{
    player.currentTime=0;
    await player.play();
  }catch(error){
    songName.innerText=nextSong.title + " • tap vinyl to play";
  }

  startImageRotation();
  surpriseBtn.disabled=false;
  isTransitioning=false;
}

function surpriseMe(){
  const nextSong=nextPlaylistSong();
  transitionToSong(nextSong);
}

player.addEventListener("ended",()=>{
  const nextSong=nextPlaylistSong();
  transitionToSong(nextSong);
});

player.addEventListener("play",()=>{
  vinyl.classList.add("playing");
});

player.addEventListener("pause",()=>{
  vinyl.classList.remove("playing");
});

function formatTime(seconds){
  if(!Number.isFinite(seconds)) return "0:00";
  const m=Math.floor(seconds/60);
  const s=Math.floor(seconds%60).toString().padStart(2,"0");
  return `${m}:${s}`;
}

player.addEventListener("timeupdate",()=>{
  if(!Number.isFinite(player.duration) || player.duration<=0) return;
  const progress=(player.currentTime/player.duration)*100;
  progressFill.style.width=`${progress}%`;
  currentTimeEl.innerText=formatTime(player.currentTime);
  durationTimeEl.innerText=formatTime(player.duration);
});

player.addEventListener("loadedmetadata",()=>{
  durationTimeEl.innerText=formatTime(player.duration);
});

progressBar.addEventListener("click",event=>{
  if(!Number.isFinite(player.duration) || player.duration<=0) return;
  const rect=progressBar.getBoundingClientRect();
  const percent=(event.clientX-rect.left)/rect.width;
  player.currentTime=Math.max(0,Math.min(player.duration,player.duration*percent));
});

let holdTimer=null;
let holdTriggered=false;
let tapCount=0;
let tapTimer=null;

function startHold(){
  if(isTransitioning) return;
  holdTriggered=false;
  holdTimer=setTimeout(()=>{
    if(!currentSong) return;

    holdTriggered=true;
    albumMode=!albumMode;
    imageIndex=0;
    updateImage(false);
    startImageRotation();

    songName.innerText=albumMode ? "💿 ALBUM MODE" : "👑 G-DRAGON MODE";

    setTimeout(()=>{
      if(currentSong && !isTransitioning){
        songName.innerText=currentSong.title;
      }
    },1700);
  },1000);
}

function stopHold(){
  clearTimeout(holdTimer);
}

function handleTap(){
  if(isTransitioning) return;

  tapCount++;
  clearTimeout(tapTimer);

  tapTimer=setTimeout(()=>{
    if(tapCount===1){
      if(!currentSong) return;

      if(player.paused){
        player.play().catch(()=>{});
      }else{
        player.pause();
      }
    }else{
      toggleImage();
    }

    tapCount=0;
  },250);
}

vinylWrapper.addEventListener("mousedown",startHold);

vinylWrapper.addEventListener("mouseup",()=>{
  stopHold();
  if(holdTriggered) return;
  handleTap();
});

vinylWrapper.addEventListener("mouseleave",stopHold);

vinylWrapper.addEventListener("touchstart",event=>{
  event.preventDefault();
  startHold();
},{passive:false});

vinylWrapper.addEventListener("touchend",event=>{
  event.preventDefault();
  stopHold();
  if(holdTriggered) return;
  handleTap();
},{passive:false});

vinylWrapper.addEventListener("touchmove",()=>{
  stopHold();
},{passive:true});

updateImage(true);
setSleeve("0",0,false);
</script>
</body>
</html>
